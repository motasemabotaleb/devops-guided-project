name: Deploy Production
on:
  workflow_run:
    workflows: ["Publish Image"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        required: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_APP_DIR: ${{ secrets.VM_APP_DIR }}
      VM_SSH_KEY_B64: ${{ secrets.VM_SSH_KEY_B64 }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
    steps:
      - name: Sanity-check required secrets are set (lengths only, never values)
        run: |
          for var in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_REGION ECR_REGISTRY ECR_REPOSITORY VM_HOST VM_USER VM_APP_DIR VM_SSH_KEY_B64 POSTGRES_PASSWORD GRAFANA_ADMIN_PASSWORD; do
            val="${!var}"
            if [ -z "$val" ]; then
              echo "::error::Secret/env $var is EMPTY"
              exit 1
            fi
            echo "$var: set (length ${#val})"
          done

      - name: Select image tag
        id: tag
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "image_tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            sha=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
            echo "image_tag=sha-$sha" >> $GITHUB_OUTPUT
          fi

      - name: Login to ECR (runner) and verify image exists
        run: |
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set region "$AWS_REGION"
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"

          aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --region "$AWS_REGION" \
            --image-ids imageTag=${{ steps.tag.outputs.image_tag }} \
            || { echo "::error::Tag ${{ steps.tag.outputs.image_tag }} not found in $ECR_REPOSITORY"; exit 1; }

      - name: Setup SSH
        run: |
          echo "$VM_SSH_KEY_B64" | base64 -d > key.pem
          chmod 600 key.pem
      - name: Deploy to EC2
        run: |
          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.tag.outputs.image_tag }}"
          ssh -i key.pem -o StrictHostKeyChecking=no "$VM_USER@$VM_HOST" \
            "AWS_ACCESS_KEY_ID='$AWS_ACCESS_KEY_ID' \
            AWS_SECRET_ACCESS_KEY='$AWS_SECRET_ACCESS_KEY' \
            AWS_REGION='$AWS_REGION' \
            IMAGE_TAG='${{ steps.tag.outputs.image_tag }}' \
            POSTGRES_PASSWORD='$POSTGRES_PASSWORD' \
            GRAFANA_ADMIN_PASSWORD='$GRAFANA_ADMIN_PASSWORD' \
            bash -s" <<EOF
          set -e

          cat > /tmp/github-secrets.txt <<SECRETS
      AWS_ACCESS_KEY_ID=\$AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY=\$AWS_SECRET_ACCESS_KEY
      AWS_REGION=\$AWS_REGION
      IMAGE_TAG=\$IMAGE_TAG
      POSTGRES_PASSWORD=\$POSTGRES_PASSWORD
      GRAFANA_ADMIN_PASSWORD=\$GRAFANA_ADMIN_PASSWORD
      SECRETS

          cat /tmp/github-secrets.txt

          cd $VM_APP_DIR

          aws configure set aws_access_key_id "\$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "\$AWS_SECRET_ACCESS_KEY"
          aws configure set region "\$AWS_REGION"

          aws ecr get-login-password --region "\$AWS_REGION" \
            | docker login --username AWS --password-stdin $ECR_REGISTRY

          docker pull $IMAGE
          docker compose -f docker-compose.vm.yml up -d
          docker ps
          EOF