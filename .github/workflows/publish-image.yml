name: Publish Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-validate:
    name: publish-test-and-validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Run app tests
        working-directory: app
        run: npm test

      - name: Validate documentation journey
        run: bash scripts/validate-doc-journey.sh

      - name: Validate static runtime contract
        run: bash scripts/validate-runtime-contract.sh static

  build-push-and-scan:
    name: build-push-and-scan
    needs: test-and-validate
    runs-on: ubuntu-latest
    env:
      REGISTRY_LOGIN_SERVER: ${{ secrets.REGISTRY_LOGIN_SERVER }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      IMAGE_NAME: ${{ secrets.REGISTRY_LOGIN_SERVER }}/devops-mini-app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate ACR configuration
        run: |
          set -euo pipefail

          missing=0

          for key in REGISTRY_LOGIN_SERVER REGISTRY_USERNAME REGISTRY_PASSWORD; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required registry secret: ${key}"
              missing=1
            fi
          done

          if [ "${missing}" -eq 1 ]; then
            echo "Configure ACR secrets before running the publish path."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_LOGIN_SERVER }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Create image tags
        id: image-tags
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ steps.image-tags.outputs.short_sha }}

      - name: Scan published image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:sha-${{ steps.image-tags.outputs.short_sha }}
          format: table
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Show pushed image names
        run: |
          echo "Published images:"
          echo "${IMAGE_NAME}:latest"
          echo "${IMAGE_NAME}:sha-${{ steps.image-tags.outputs.short_sha }}"
